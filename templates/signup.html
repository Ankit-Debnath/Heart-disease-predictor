<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>

<body>

<div class="container">

    <div class="signup-card">

        <h1>Create Account</h1>
        <p>Heart Disease Prediction System</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-error" style="background-color: #fee2e2; color: #ef4444; padding: 12px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; border: 1px solid #fca5a5; text-align: center; font-weight: 500;">
                        ⚠️ {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/signup" method="POST">

            <div class="input-group">
                <label>Full Name</label>
                <input
                    type="text"
                    name="fullname"
                    placeholder="John Doe"
                    required>
            </div>

            <div class="input-group">
                <label>Username</label>
                <input
                    type="text"
                    name="username"
                    placeholder="choose_username123"
                    required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input
                    type="password"
                    name="password"
                    placeholder="********"
                    required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input
                    type="password"
                    name="confirm_password"
                    placeholder="********"
                    required>
            </div>

            <button type="submit">
                Create Account
            </button>

        </form>

        <p class="bottom" style="text-align: center; margin-top: 20px; color: #555;">
            Already have an account?
            <a href="/" style="color: #2563EB; text-decoration: none; font-weight: 600;">Login</a>
        </p>

    </div>

</div>

</body>
</html>
