<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px;">
            <h1 style="margin: 0; font-size: 28px;">❤️ Heart Disease Prediction</h1>
            
            <div style="display: flex; gap: 12px; align-items: center;">
                <form action="/delete_account" method="POST" onsubmit="return confirm('Are you absolutely sure you want to permanently delete your account? This action cannot be undone.');" style="margin: 0; padding: 0; display: inline;">
                    <button type="submit" style="color: #ffffff; border: none; font-weight: 600; font-size: 13px; padding: 8px 14px; border-radius: 8px; background-color: #dc2626; cursor: pointer; width: auto; transition: background 0.2s;">
                        Delete Account
                    </button>
                </form>
                
                <a href="/logout" style="color: #ef4444; text-decoration: none; font-weight: 600; font-size: 13px; padding: 7px 14px; border: 1px solid #fca5a5; border-radius: 8px; background-color: #fee2e2; transition: background 0.2s;">
                    Logout
                </a>
            </div>
        </div>

        <p class="subtitle">
            Enter the patient's medical details below for diagnosis
        </p>

        <form id="predictionForm">
            <div class="grid">

                <div class="input-box">
                    <label>Age (years)</label>
                    <input type="number" name="age" min="1" max="120" placeholder="e.g. 45" required>
                </div>

                <div class="input-box">
                    <label>Sex</label>
                    <select name="sex" required>
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Chest Pain Type</label>
                    <select name="cp" required>
                        <option value="0">Typical Angina (0)</option>
                        <option value="1">Atypical Angina (1)</option>
                        <option value="2">Non-anginal Pain (2)</option>
                        <option value="3">Asymptomatic (3)</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Resting BP (mm Hg)</label>
                    <input type="number" name="trestbps" min="50" max="250" placeholder="e.g. 120" required>
                </div>

                <div class="input-box">
                    <label>Cholesterol (mg/dl)</label>
                    <input type="number" name="chol" min="100" max="600" placeholder="e.g. 200" required>
                </div>

                <div class="input-box">
                    <label>Fasting Blood Sugar > 120 mg/dl</label>
                    <select name="fbs" required>
                        <option value="0">False (0)</option>
                        <option value="1">True (1)</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Resting ECG Results</label>
                    <select name="restecg" required>
                        <option value="0">Normal (0)</option>
                        <option value="1">ST-T Wave Abnormality (1)</option>
                        <option value="2">Left Ventricular Hypertrophy (2)</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Max Heart Rate Achieved</label>
                    <input type="number" name="thalach" min="60" max="220" placeholder="e.g. 150" required>
                </div>

                <div class="input-box">
                    <label>Exercise Induced Angina</label>
                    <select name="exang" required>
                        <option value="0">No (0)</option>
                        <option value="1">Yes (1)</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>ST Depression (Old Peak)</label>
                    <input type="number" step="0.1" min="0.0" max="10.0" name="oldpeak" placeholder="e.g. 1.0" required>
                </div>

                <div class="input-box">
                    <label>Slope of Peak ST Segment</label>
                    <select name="slope" required>
                        <option value="0">Upsloping (0)</option>
                        <option value="1">Flat (1)</option>
                        <option value="2">Downsloping (2)</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Major Vessels (CA)</label>
                    <select name="ca" required>
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Thalassemia (Thal)</label>
                    <select name="thal" required>
                        <option value="0">Normal (0)</option>
                        <option value="1">Fixed Defect (1)</option>
                        <option value="2">Reversable Defect (2)</option>
                        <option value="3">Severe/Other (3)</option>
                    </select>
                </div>

            </div>

            <button type="submit" style="width: 100%; margin-top: 20px;">Predict Risk</button>
        </form>

        <div id="result" style="display: none; margin-top: 25px; padding: 15px; border-radius: 10px; font-weight: 500; text-align: center;"></div>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
